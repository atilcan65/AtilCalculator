<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AtilCalculator</title>
  <link rel="stylesheet" href="styles.css">
  <!-- STORY-009 AC1 + AC6: 3 skin CSS files. Each file defines its own
       :root[data-skin="<name>"] block; theme.js flips data-skin on
       <html> so the right cascade applies. Skins are also auto-discovered
       by /api/skin (scans this directory at server start). -->
  <link rel="stylesheet" href="skins/dark.css">
  <link rel="stylesheet" href="skins/light.css">
  <link rel="stylesheet" href="skins/retro.css">
</head>
<body>
  <atilcalc-mode-toggle active="dark"></atilcalc-mode-toggle>
  <atilcalc-history></atilcalc-history>
  <atilcalc-display></atilcalc-display>
  <atilcalc-keypad></atilcalc-keypad>
  <atilcalc-error-toast></atilcalc-error-toast>
  <atilcalc-help-popup></atilcalc-help-popup>
  <script type="module" src="shortcuts.js"></script>
  <script type="module" src="app.js"></script>
  <script type="module" src="app-deferred.js"></script>
  <script type="module" src="theme.js"></script>
</body>
</html>
