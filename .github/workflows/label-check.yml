name: Label Check (ADR-0012)

# Enforces the 4-category required label set on every issue and PR:
#   - type:*     (one of: vision, feature, bug, docs, chore, refactor, incident)
#   - status:*   (one of: backlog, ready, in-progress, in-review, blocked, done)
#   - agent:*    (one of: orchestrator, product-manager, architect, developer, tester, human)
#   - cc:*       (one of: orchestrator, product-manager, architect, developer, tester, human)
#
# Layer 3 (added 2026-06-21, Issue #213 TEST-WAKE-ENFORCE Layer 3, ADR-0012
# §Type-driven invariants): for PRs with `type:bug`, additionally enforce
#   - cc:tester
#   - needs-tester-signoff
# These are correctness-bearing labels for bug-fix PRs; without them the PR
# can sit in `status:ready` with zero reviewer verdicts (the silent-skip gap
# observed on PR #212 / Issue #213).
#
# Owner-override: for `type:bug` PRs only, the owner may skip the cc:tester +
# needs-tester-signoff requirement with **explicit rationale in the PR body**
# (e.g. "emergency hotfix, CI gate enforces test coverage separately"). This
# CI workflow does not parse the PR body; the audit trail is the PR body +
# comment thread (per ADR-0012 §Owner override). Owner-override is parallel
# to the broader doctrine in ADR-0031.
#
# If any category is missing, the workflow comments on the issue/PR listing
# exactly which categories are missing (idempotent — replaces its own previous
# comment) and the check fails. Re-fires on every label/unlabel event so the
# agent fix-back loop drives it green.
#
# See docs/decisions/ADR-0012-required-label-set.md for the full rationale.

on:
  issues:
    types: [opened, reopened, labeled, unlabeled]
  pull_request_target:
    types: [opened, reopened, labeled, unlabeled]

permissions:
  issues: write
  pull-requests: write

# Layer 4 (Issue #423, ADR-0012 §Cascade-strip scope-tightening Part 1):
# serialize concurrent label/unlabel events per PR/issue so the duplicate-removal
# logic doesn't race against itself (tester blocker Q3). cancel-in-progress: false
# means an in-flight run completes; a new run starts only after it.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  label-check:
    runs-on: ubuntu-latest
    steps:
      - name: Verify required label categories
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          MARKER: "<!-- adr-0012-label-check -->"
        with:
          script: |
            const marker = process.env.MARKER;
            const isPR = !!context.payload.pull_request;
            const target = isPR ? context.payload.pull_request : context.payload.issue;
            const number = target.number;
            const labels = (target.labels || []).map(l => (typeof l === 'string' ? l : l.name));

            // ADR-0015 §3 closed-state bypass — sister-pattern to cascade-strip (L267) + Layer 5 (L393)
            // Skips closed issues + closed/merged PRs to align workflow behavior with the ADR claim
            // that "Label Check workflow kapalı (closed) issue'ları ignore eder, bu bypass güvenlidir".
            // Regression guard: scripts/tests/d076-label-check-state-filter.sh (refs #670).
            if (target.state === 'closed') {
              core.info(`Skipping ${kind} #${number} — closed state, ADR-0015 §3 bypass`);
              return;
            }

            // Recognised label sets — keep in sync with scripts/bootstrap-labels.sh
            const required = {
              'type:':   ['vision','feature','bug','docs','chore','refactor','incident'],
              'status:': ['backlog','ready','in-progress','in-review','blocked','done'],
              'agent:':  ['orchestrator','product-manager','architect','developer','tester','human'],
              'cc:':     ['orchestrator','product-manager','architect','developer','tester','human'],
            };

            const present = {};
            const missing = [];
            for (const [prefix, options] of Object.entries(required)) {
              const found = labels.filter(l => l && l.startsWith(prefix));
              present[prefix] = found;
              if (found.length === 0) {
                missing.push({ prefix, options });
              }
            }

            const kind = isPR ? 'PR' : 'Issue';
            core.info(`${kind} #${number} labels: ${labels.join(', ') || '(none)'}`);
            core.info(`Present per category: ${JSON.stringify(present)}`);

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Find existing bot comment by marker
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: number, per_page: 100,
            });
            const existing = comments.find(c =>
              c.user && c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );

            if (missing.length === 0) {
              // Success — clean up any prior failure comment, exit green
              if (existing) {
                const body = `${marker}\n✅ **Label check passed (ADR-0012).** All four required categories are present.`;
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: existing.id, body,
                });
              }
              core.info(`✅ All 4 required categories present on ${kind} #${number}.`);
              return;
            }

            // Build failure comment
            const lines = [
              marker,
              `### ❌ Label check failed (ADR-0012)`,
              ``,
              `This ${kind.toLowerCase()} is missing labels from the following required categor${missing.length === 1 ? 'y' : 'ies'}. Per [ADR-0012](../blob/main/docs/decisions/ADR-0012-required-label-set.md), every issue and PR must carry **one label from each of the four categories** at birth.`,
              ``,
              `| Category | Status | Pick one of |`,
              `|---|---|---|`,
            ];
            for (const [prefix, options] of Object.entries(required)) {
              const ok = present[prefix].length > 0;
              const status = ok ? `✅ \`${present[prefix].join(', ')}\`` : `❌ **missing**`;
              const picks = options.map(o => `\`${prefix}${o}\``).join(', ');
              lines.push(`| \`${prefix}*\` | ${status} | ${picks} |`);
            }
            lines.push(``);
            lines.push(`Fix: \`gh ${isPR ? 'pr' : 'issue'} edit ${number} ${missing.map(m => `--add-label "${m.prefix}<pick>"`).join(' ')}\``);
            lines.push(``);
            lines.push(`This check re-runs on every label change, so it will turn green automatically once the missing categories are added.`);

            const body = lines.join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: number, body,
              });
            }

            core.setFailed(`${kind} #${number} missing required label categor${missing.length === 1 ? 'y' : 'ies'}: ${missing.map(m => m.prefix + '*').join(', ')}`);

      # Layer 3 (Issue #213 TEST-WAKE-ENFORCE + Issue #227 RCA-20 fix + TD-022):
      # type-driven invariants for `type:bug` PRs (cc:tester + needs-tester-signoff).
      #
      # Action filter (TD-022, ADR-0035 retrofitted): only fire on `opened` or
      # `reopened` events. Without this filter, Layer 3 also fires on
      # `labeled`/`unlabeled` events on already-open PRs, causing CI RED on
      # otherwise-correct PRs (e.g. PR #245 closed 2026-06-22T10:39:53Z as
      # redundant — owner removed cc:tester + needs-tester-signoff when
      # flipping to status:ready, triggering Layer 3 on a label-change event
      # even though the PR was being closed as no-op).
      #
      # Trade-off: this filter does NOT catch label-removal attacks (rare).
      # If `cc:tester`/`needs-tester-signoff` are removed on an open PR after
      # the initial open event, Layer 3 won't re-fire. Mitigation: the
      # stale-verdict watchdog (ADR-0024) catches stale `verdict-by:<ts>`
      # labels, and the watcher loop's `processed_event_ids` dedup prevents
      # silent-skip gaps. Owner-override on label removal is acceptable per
      # ADR-0031.
      #
      # Skipped for issues per ADR-0012 §Interaction example 3.
      # Owner-override via PR body rationale documented in comment but not
      # parsed by this workflow (per ADR-0012 §Owner override).
      - name: Layer 3 — type:bug requires cc:tester + needs-tester-signoff
        if: github.event_name == 'pull_request_target' && (github.event.action == 'opened' || github.event.action == 'reopened')
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          MARKER: "<!-- adr-0012-type-driven -->"
        with:
          script: |
            const marker = process.env.MARKER;
            const pr = context.payload.pull_request;
            const number = pr.number;
            const labels = (pr.labels || []).map(l => (typeof l === 'string' ? l : l.name));

            // Layer 3 only fires for `type:bug` PRs.
            if (!labels.includes('type:bug')) {
              core.info(`PR #${number} is not type:bug; Layer 3 type-driven check skipped.`);
              return;
            }

            // Required additional labels for type:bug PRs.
            const requiredExtra = ['cc:tester', 'needs-tester-signoff'];
            const missingExtra = requiredExtra.filter(l => !labels.includes(l));

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Find existing bot comment by marker (separate from the 4-cat check)
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: number, per_page: 100,
            });
            const existing = comments.find(c =>
              c.user && c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );

            if (missingExtra.length === 0) {
              // Success — clean up any prior failure comment, exit green
              if (existing) {
                const body = `${marker}\n✅ **Layer 3 type-driven check passed (ADR-0012).** \`type:bug\` PR carries \`cc:tester\` + \`needs-tester-signoff\`.`;
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: existing.id, body,
                });
              }
              core.info(`✅ Layer 3 type-driven check passed on PR #${number}.`);
              return;
            }

            // Build failure comment
            const lines = [
              marker,
              `### ❌ Layer 3 type-driven check failed (ADR-0012, Issue #213)`,
              ``,
              `This PR is \`type:bug\` and is **missing ${missingExtra.length === 1 ? 'label' : 'labels'}** required for correctness-bearing bug fixes:`,
              ``,
              `| Required label | Status |`,
              `|---|---|`,
              ...requiredExtra.map(l => {
                const ok = labels.includes(l);
                const status = ok ? `✅ \`${l}\`` : `❌ **missing**`;
                return `| \`${l}\` | ${status} |`;
              }),
              ``,
              `**Why this is required**: per [ADR-0012 §Type-driven invariants](../blob/main/docs/decisions/ADR-0012-required-label-set.md) (amended 2026-06-21, [Issue #213](https://github.com/atilcan65/AtilCalculator/issues/213)), \`type:bug\` PRs MUST have \`cc:tester\` + \`needs-tester-signoff\` at open. Without these labels, the PR can sit in \`status:ready\` for hours with **zero reviewer verdicts** — the silent-skip gap that caused the Sprint 4 RCA chain (#213 → PR #212 / #215).`,
              ``,
              `**Fix**: \`gh pr edit ${number} --add-label "${missingExtra.join('" --add-label "')}"\``,
              ``,
              `**Owner override** (per ADR-0012 §Owner override + ADR-0031): if this is an emergency hotfix and the CI gate enforces test coverage separately, the owner may add **explicit rationale in the PR body** (e.g. "emergency hotfix, CI gate enforces test coverage separately"). This CI workflow does not parse the PR body; the audit trail is the PR body + this comment thread.`,
              ``,
              `This check re-runs on every label change, so it will turn green automatically once the missing labels are added.`,
            ];

            const body = lines.join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: number, body,
              });
            }

            core.setFailed(`PR #${number} (type:bug) missing required label(s): ${missingExtra.join(', ')} per ADR-0012 §Type-driven invariants.`);

      # Layer 4 (ADR-0012 §Cascade-strip scope-tightening Part 1, Issue #423):
      # doctrinal anchor: ADR-0012 (PR #418 amend, PR #424 clarification MERGED).
      # scope-tightened duplicate status:* removal. Preserves reviewer chain.
      - name: Layer 4 — scope-tightened duplicate status:* removal
        if: github.event_name == 'pull_request_target' || github.event_name == 'issues'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          MARKER: "<!-- adr-0012-cascade-strip-tightening -->"
        with:
          script: |
            const marker = process.env.MARKER;
            const isPR = !!context.payload.pull_request;
            const target = isPR ? context.payload.pull_request : context.payload.issue;
            const number = target.number;
            const issueState = target.state;

            // Q5b: early-return on closed PR/issue (frozen state, no-op)
            if (issueState === 'closed') {
              core.info(`PR/Issue #${number} is closed; cascade-strip no-op.`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Current labels on the issue/PR
            const currentLabels = (target.labels || []).map(l => (typeof l === 'string' ? l : l.name));

            // Collect status:* labels currently present
            const currentStatusLabels = currentLabels.filter(l => l.startsWith('status:'));

            // Q5a: fail-check for 3+ status:* labels (ADR-0012 mutual exclusion violation)
            if (currentStatusLabels.length > 2) {
              const errBody = `${marker}\n❌ **Cascade-strip fail-check (ADR-0012 §Mutual exclusion)**: ${currentStatusLabels.length} status:* labels detected (${currentStatusLabels.join(', ')}). Only 1 canonical status per issue/PR. Manual intervention required.`;
              const { data: errComments } = await github.rest.issues.listComments({ owner, repo, issue_number: number, per_page: 100 });
              const errExisting = errComments.find(c => c.user && c.user.type === 'Bot' && c.body && c.body.includes(marker + '-error'));
              if (errExisting) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: errExisting.id, body: errBody });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: number, body: errBody });
              }
              core.setFailed(`ADR-0012 §Mutual exclusion violation: ${currentStatusLabels.length} status:* labels on #${number}`);
              return;
            }

            if (currentStatusLabels.length <= 1) {
              core.info(`PR/Issue #${number} has ≤1 status:* labels; cascade-strip not needed.`);
              return;
            }

            // Q1: get createdAt from /events endpoint with LabeledEvent filter
            const events = await github.paginate(github.rest.issues.listEvents, {
              owner, repo, issue_number: number, per_page: 100
            });
            const earliestByName = new Map();
            for (const ev of events) {
              if (ev.event === 'labeled' && ev.label && ev.label.name && ev.label.name.startsWith('status:')) {
                const name = ev.label.name;
                const ts = new Date(ev.created_at).getTime();
                if (!earliestByName.has(name) || earliestByName.get(name) > ts) {
                  earliestByName.set(name, ts);
                }
              }
            }

            // Sort by earliest application time, oldest wins (arch's createdAt sort clarification)
            // D1 deviation: RHS variable `earliestByCreated` in peer-reviewed cmt 4808221671 line 67
            //   was a typo for `earliestByName`. Fixed 1 char to match the LHS Map. See PR §Deviations D1.
            const sortedByCreated = currentStatusLabels.sort((a, b) => earliestByName.get(a) - earliestByName.get(b));
            const primary = sortedByCreated[0];
            const duplicates = sortedByCreated.slice(1);

            core.info(`PR/Issue #${number} has ${currentStatusLabels.length} status:* labels. Primary (oldest): ${primary}, duplicates: ${duplicates.join(', ')}`);

            // Remove duplicates only — preserve primary + all cc:* + needs-*-signoff + agent:*
            const removed = [];
            for (const dup of duplicates) {
              await github.rest.issues.removeLabel({ owner, repo, issue_number: number, name: dup });
              removed.push(dup);
              core.info(`Removed duplicate status:* label: ${dup} (primary ${primary} preserved)`);
            }

            // Q2 audit-trail idempotency: edit existing marker comment if present, else create
            const auditBody = [
              marker,
              '**Cascade-strip scope-tightening applied (Layer 4)**',
              '',
              `- **Trigger**: \`${context.eventName || context.event_name}\` event, action=\`${context.payload.action || '(batch)'}\`, label=\`${context.payload.label?.name || '(batch)'}\``,
              `- **Status labels observed**: \`${currentStatusLabels.join(', ')}\``,
              `- **Primary (preserved)**: \`${primary}\` (oldest application by createdAt)`,
              `- **Removed**: \`${removed.join(', ')}\` (newer than primary)`,
              `- **Preserved**: all \`cc:*\`, \`needs-*-signoff\`, \`agent:*\` (NOT touched per ADR-0012 §Cascade-strip)`,
              `- **Workflow run**: \`${{ github.run_id }}\``,
              `- **ADR**: \`docs/decisions/ADR-0012-required-label-set.md\` §Cascade-strip scope-tightening Part 1`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: number, per_page: 100 });
            const existing = comments.find(c => c.user && c.user.type === 'Bot' && c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: auditBody });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: number, body: auditBody });
            }

            core.info(`✅ Cascade-strip scope-tightened on #${number}.`);

      # Layer 5 (Issue #425 AC #4, ADR-0048, docs PR #430 + ADR #431): status:ready
      # auto-add gating by type-driven reviewer chain. Closes PR #393 root-cause
      # variant (premature status:ready on arch verdict alone for non-docs PRs).
      #
      # Per ADR-0012 §Cascade-strip scope-tightening Part 2 + ADR-0048:
      #   - type:docs PRs (agent:architect|product-manager|orchestrator): arch/PM/orch
      #     verdict sufficient (ADR-0021 docs PR convention).
      #   - Non-docs (type:bug, type:feature, type:refactor, type:chore, type:incident):
      #     needs-tester-signoff MUST be cleared by tester APPROVED verdict.
      #   - Unknown type: defensive default to non-docs path (tester prereq).
      #
      # Atomic transition (sister-pattern to PR #428): removeLabel('status:in-review')
      # FIRST, then addLabel('status:ready'). gh batches into one PATCH.
      #
      # Reversal handler (TC4): if needs-tester-signoff is re-added AFTER tester
      # APPROVED (e.g. dev pushes new commit, tester re-rejects), removeLabel
      # ('status:ready'). Sister-pattern: PR #426 Layer 4 (concurrency block, marker
      # pattern, idempotent bot-attributed comments).
      - name: Layer 5 — status:ready auto-add gating (type-driven reviewer chain, ADR-0048)
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          MARKER: "<!-- adr-0012-status-ready-gating -->"
          MARKER_SKIP: "<!-- adr-0012-status-ready-gating-skip -->"
          MARKER_REVERSAL: "<!-- adr-0012-status-ready-gating-reversal -->"
        with:
          script: |
            const marker = process.env.MARKER;
            const markerSkip = process.env.MARKER_SKIP;
            const markerReversal = process.env.MARKER_REVERSAL;
            const pr = context.payload.pull_request;
            const number = pr.number;
            const issueState = pr.state;
            const labels = (pr.labels || []).map(l => (typeof l === 'string' ? l : l.name));
            const hasLabel = (name) => labels.includes(name);

            // Q5b: early-return on closed PR (frozen state, no-op)
            if (issueState === 'closed') {
              core.info(`PR #${number} is closed; Layer 5 no-op.`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // ------------------------------------------------------------------
            // TC4 reversal handler: needs-tester-signoff re-added AFTER tester
            // APPROVED → removeLabel('status:ready'). Sister-pattern to PR #426
            // Layer 4 (markers, idempotent bot-attributed comments).
            // ------------------------------------------------------------------
            // HOTFIX (Issue #436 P0): context.event.action is undefined on pull_request_target
            // (context.event is the WebhookEvent metadata {name, payload}, NOT {action}).
            // Canonical accessor is context.payload.action. Defensive fallback: 'opened' default.
            const evtAction = context.payload.action || 'opened';
            if (evtAction === 'labeled' && context.payload.label && context.payload.label.name === 'needs-tester-signoff' && hasLabel('status:ready')) {
              await github.rest.issues.removeLabel({ owner, repo, issue_number: number, name: 'status:ready' });
              const reversalBody = [
                markerReversal,
                '**Layer 5 reversal handler fired (ADR-0048 §Type-driven table — TC4)**',
                '',
                `- **Trigger**: \`${context.event_name}\` event, action=\`labeled\`, label=\`needs-tester-signoff\``,
                `- **Removed**: \`status:ready\` (tester re-rejected after APPROVED — needs-tester-signoff re-added)`,
                `- **PR**: #${number}`,
                `- **Workflow run**: \`${{ github.run_id }}\``,
                `- **ADR**: \`docs/decisions/ADR-0048-status-ready-auto-add-gating.md\``,
              ].join('\n');
              const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: number, per_page: 100 });
              const existing = comments.find(c => c.user && c.user.type === 'Bot' && c.body && c.body.includes(markerReversal));
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: reversalBody });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: number, body: reversalBody });
              }
              core.info(`✅ Layer 5 reversal: removed status:ready from PR #${number} (needs-tester-signoff re-added).`);
              return;
            }

            // ------------------------------------------------------------------
            // Step 1: Determine PR type + agent (type-driven table lookup).
            // ------------------------------------------------------------------
            const type = labels.find(l => l.startsWith('type:'));
            const agent = labels.find(l => l.startsWith('agent:'));

            // Step 2: Type-driven decision (ADR-0048 §Type-driven table).
            const isDocs = type === 'type:docs';
            const docsAuthor = agent === 'agent:architect' || agent === 'agent:product-manager' || agent === 'agent:orchestrator';
            const nonDocsTypes = ['type:bug', 'type:feature', 'type:refactor', 'type:chore', 'type:incident'];
            const isNonDocs = nonDocsTypes.includes(type);

            let shouldAddReady = false;
            let skipReason = '';

            if (isDocs && docsAuthor) {
              // ADR-0021: docs PR convention — arch/PM/orch verdict sufficient.
              // needs-architect-review cleared → ready. (PM/orch don't carry that
              // label, so this check naturally passes for them.)
              const archCleared = !hasLabel('needs-architect-review');
              if (archCleared) {
                shouldAddReady = true;
              } else {
                skipReason = `type:docs but needs-architect-review still present (waiting on arch verdict)`;
              }
            } else {
              // Non-docs (or unknown type — defensive default): tester prereq.
              const testerCleared = !hasLabel('needs-tester-signoff');
              if (testerCleared) {
                shouldAddReady = true;
              } else {
                skipReason = `non-docs PR (type=${type || 'unknown'}), needs-tester-signoff still present (tester prereq missing)`;
              }
            }

            // ------------------------------------------------------------------
            // Step 3: Silent-skip audit (ADR-0012 §d lens silent-skip risk).
            // ------------------------------------------------------------------
            if (!shouldAddReady) {
              const skipBody = [
                markerSkip,
                '**Layer 5 silent-skip (ADR-0048 §Type-driven table)**',
                '',
                `- **Trigger**: \`${context.eventName || context.event_name}\` event, action=\`${context.payload.action || '(batch)'}\`, label=\`${context.payload.label && context.payload.label.name || '(batch)'}\``,
                `- **PR**: #${number}`,
                `- **Type**: \`${type || '(none)'}\``,
                `- **Agent**: \`${agent || '(none)'}\``,
                `- **Reason**: ${skipReason}`,
                `- **Decision**: skip status:ready auto-add (reviewer chain incomplete)`,
                `- **Workflow run**: \`${{ github.run_id }}\``,
                `- **ADR**: \`docs/decisions/ADR-0048-status-ready-auto-add-gating.md\``,
              ].join('\n');
              const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: number, per_page: 100 });
              const existing = comments.find(c => c.user && c.user.type === 'Bot' && c.body && c.body.includes(markerSkip));
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: skipBody });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: number, body: skipBody });
              }
              core.info(`⏭️ Layer 5 silent-skip on PR #${number}: ${skipReason}`);
              return;
            }

            // ------------------------------------------------------------------
            // Step 4: Atomic transition — removeLabel('status:in-review') FIRST,
            // then addLabel('status:ready'). gh batches into one PATCH (sister-
            // pattern to PR #428 atomic flip). Cascade-strip Part 1 preserves
            // the OLDER label, so we remove status:in-review first to ensure
            // status:ready becomes the canonical primary.
            // ------------------------------------------------------------------
            if (hasLabel('status:in-review')) {
              await github.rest.issues.removeLabel({ owner, repo, issue_number: number, name: 'status:in-review' });
            }
            if (!hasLabel('status:ready')) {
              // Issue #564 §32 LIVE INSTANCE #8: status:ready auto-add MUST also add cc:human
              // companion per ADR-0012 4-cat invariant (status:ready requires cc:human for
              // owner squash gate). Without this companion, future PRs auto-promote to
              // status:ready but lack cc:human, violating 4-cat invariant until manual fix.
              const labelsToAdd = ['status:ready'];
              if (!hasLabel('cc:human')) {
                labelsToAdd.push('cc:human');
              }
              await github.rest.issues.addLabels({ owner, repo, issue_number: number, labels: labelsToAdd });
            }

            // ------------------------------------------------------------------
            // Step 5: Audit trail (sister-pattern to PR #426 Layer 4).
            // ------------------------------------------------------------------
            const auditBody = [
              marker,
              '**Layer 5 status:ready auto-added (ADR-0048 §Type-driven table)**',
              '',
              `- **Trigger**: \`${context.eventName || context.event_name}\` event, action=\`${context.payload.action || '(batch)'}\`, label=\`${context.payload.label && context.payload.label.name || '(batch)'}\``,
              `- **PR**: #${number}`,
              `- **Type**: \`${type || '(none)'}\``,
              `- **Agent**: \`${agent || '(none)'}\``,
              `- **Decision**: addLabel('status:ready') + removeLabel('status:in-review') (atomic transition, sister-pattern PR #428)`,
              `- **Workflow run**: \`${{ github.run_id }}\``,
              `- **ADR**: \`docs/decisions/ADR-0048-status-ready-auto-add-gating.md\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: number, per_page: 100 });
            const existing = comments.find(c => c.user && c.user.type === 'Bot' && c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: auditBody });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: number, body: auditBody });
            }

            core.info(`✅ Layer 5: status:ready auto-added to PR #${number} (type=${type}).`);
