name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # Issue #27 (P1) — CI was previously gated solely on `package.json`,
      # which silently no-op'd every Python PR. Detection now emits a flag
      # per language; all subsequent steps gate on their own flag.
      # Regression pin: scripts/tests/ci-detects-pyproject.sh
      # -------------------------------------------------------------------------
      - name: Detect project type
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "node=true" >> $GITHUB_OUTPUT
          else
            echo "node=false" >> $GITHUB_OUTPUT
          fi
          if [ -f pyproject.toml ]; then
            echo "python=true" >> $GITHUB_OUTPUT
          else
            echo "python=false" >> $GITHUB_OUTPUT
          fi

      # --- Node.js path (unchanged from prior to issue #27) ---------------------
      - name: Setup Node.js
        if: steps.detect.outputs.node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.detect.outputs.node == 'true'
        run: npm ci

      - name: Lint (Node)
        if: steps.detect.outputs.node == 'true'
        run: |
          if npm run --silent 2>&1 | grep -q "lint"; then
            npm run lint
          else
            echo "No lint script found — skipping"
          fi

      - name: Test (Node)
        if: steps.detect.outputs.node == 'true'
        run: |
          if npm run --silent 2>&1 | grep -q "test"; then
            npm test
          else
            echo "No test script found — skipping"
          fi

      # --- Python path (added by issue #27 fix) --------------------------------
      # Per ADR-0017 §CI: ruff check → mypy --strict src/atilcalc/engine → pytest.
      # Python version pinned to 3.12 to match .python-version + the dev venv.
      - name: Setup Python
        if: steps.detect.outputs.python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        if: steps.detect.outputs.python == 'true'
        run: |
          python -m pip install --upgrade pip
          # Editable install with [dev] extra (per pyproject.toml). Engine stays
          # stdlib-only at runtime, so this is the only install step.
          pip install -e ".[dev]"

      - name: Lint (Python)
        # Skip if no Python source files (e.g. workflow-only PRs like the one
        # that introduced this fix). ruff exits 0 on an empty tree, but mypy
        # and pytest exit non-zero, so we gate all three on file presence.
        if: steps.detect.outputs.python == 'true' && hashFiles('src/**/*.py') != ''
        run: ruff check .

      - name: Type-check (Python)
        if: steps.detect.outputs.python == 'true' && hashFiles('src/atilcalc/engine/**/*.py') != ''
        run: mypy --strict src/atilcalc/engine

      - name: Test (Python)
        if: steps.detect.outputs.python == 'true' && hashFiles('tests/**/*.py') != ''
        run: |
          # pytest-cov reads configuration from pyproject.toml [tool.coverage.*]
          # and [tool.pytest.ini_options]. The --cov-fail-under matches the
          # ≥90% engine coverage gate (STORY-002 AC8).
          pytest -q --cov=src/atilcalc/engine --cov-fail-under=90

      # --- No-source sentinel (now correctly gated on BOTH flags being false) --
      - name: No source yet
        if: steps.detect.outputs.node == 'false' && steps.detect.outputs.python == 'false'
        run: echo "📦 No package.json or pyproject.toml yet — repo scaffold only. CI will run actual checks once code is added."

  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            perf
            build
            revert
